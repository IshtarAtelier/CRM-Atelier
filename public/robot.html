<!DOCTYPE html>
<html>
<head><title>Robot SmartLab v19</title><style>
body{font-family:system-ui;background:#fafaf9;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:white;border-radius:24px;padding:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.15);max-width:500px;text-align:center;border:2px solid #e7e5e4}
h1{font-size:28px;font-weight:900;color:#1c1917;margin:0 0 12px}
p{color:#78716c;margin:0 0 32px;line-height:1.6}
.drag-zone{background:linear-gradient(135deg,#fffbeb,#fff7ed);border:3px dashed #fbbf24;border-radius:20px;padding:40px}
a.robot{display:inline-block;padding:20px 48px;background:linear-gradient(135deg,#fbbf24,#f97316);color:#451a03;border-radius:16px;font-size:18px;font-weight:900;text-decoration:none;box-shadow:0 20px 25px -5px rgba(251,191,36,.3);cursor:grab;user-select:none;transition:transform .2s}
a.robot:hover{transform:scale(1.05)}
a.robot:active{cursor:grabbing}
.hint{color:#b45309;font-weight:700;font-size:14px;margin-top:16px}
.ok{color:#16a34a;font-weight:700;font-size:13px;margin-top:24px}
</style></head>
<body>
<div class="card">
<h1>🤖 Robot SmartLab v20</h1>
<p>Arrastrá el botón naranja a tu barra de favoritos.<br>Si ya tenés uno viejo, borralo primero.</p>
<div class="drag-zone">
<a class="robot" id="robotLink" href="#">🤖 Atelier → SmartLab</a>
<p class="hint">⬆️ Arrastrá este botón a tu barra de favoritos</p>
</div>
<p class="ok">✅ v20: + Índice de refracción en selección de material y artículo</p>
</div>
<script>
var c = "javascript:void(function(){try{"
+"var h=window.location.hash,idx=h.indexOf('ATELIER_DATA=');"
+"if(idx<0){alert('No hay datos de Atelier');return}"
+"var j=decodeURIComponent(h.substring(idx+13)),D=JSON.parse(j);"
+"var IS=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value').set;"
+"var TS=Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,'value').set;"
+"function SV(el,v){if(!el)return;var s=el.tagName==='TEXTAREA'?TS:IS;if(s)s.call(el,v);el.dispatchEvent(new Event('input',{bubbles:true}));el.dispatchEvent(new Event('change',{bubbles:true}))}"
+"var done=[];"
// ===== SEL_BY_LABEL: now uses BEST MATCH for fuzzy (most terms win) =====
+"function SEL_BY_LABEL(lblTxt,txt,nm,cb,fz){"
+"var all=document.querySelectorAll('label,span,p,div');var box=null;"
+"for(var i=0;i<all.length;i++){"
+"var t=(all[i].innerText||'').trim().toLowerCase();"
+"var l=lblTxt.toLowerCase();"
+"if(t===l||t===l+':'||t===l+'*'||t===l+' *'){"
+"var nx=all[i].nextElementSibling;if(nx){box=nx.querySelector(\"[role='combobox']\");if(!box)box=nx.querySelector('select');if(!box)box=nx.querySelector('button');}"
+"if(!box){var p=all[i].parentElement;if(p){box=p.querySelector(\"[role='combobox']\");if(!box)box=p.querySelector('select');if(!box)box=p.querySelector('button');}}"
+"if(!box){box=all[i].querySelector(\"[role='combobox']\");if(!box)box=all[i].querySelector('select');if(!box)box=all[i].querySelector('button');}"
+"if(box)break;"
+"}}"
// Handle native <select> elements directly
+"if(box&&box.tagName==='SELECT'){"
+"if(txt){for(var si=0;si<box.options.length;si++){if(box.options[si].text.toLowerCase().indexOf(txt.toLowerCase())>-1){box.selectedIndex=si;box.dispatchEvent(new Event('change',{bubbles:true}));done.push(nm);break}}}"
+"if(cb)setTimeout(cb,500);return}"
// If no box found or no value to set
+"if(!box||(!txt&&!fz)){console.warn('SEL_BY_LABEL: not found for:', lblTxt);if(cb)cb();return}"
+"box.focus();"
+"box.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));"
+"box.click();"
+"setTimeout(function(){"
+"var lbs=document.querySelectorAll(\"[role='listbox']\");"
+"var lb=lbs[lbs.length-1];"
+"if(lb){var opts=lb.querySelectorAll(\"[role='option']\");var pk=false;"
// FUZZY BEST MATCH: pick option with most matching terms (not requiring all)
+"if(fz&&fz.length>0){"
+"var bestIdx=-1,bestScore=0;"
+"for(var o=0;o<opts.length;o++){var ot=(opts[o].innerText||'').toLowerCase(),mc=0;for(var f=0;f<fz.length;f++)if(ot.indexOf(fz[f])>-1)mc++;if(mc>bestScore){bestScore=mc;bestIdx=o}}"
+"if(bestIdx>-1&&bestScore>0){opts[bestIdx].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));opts[bestIdx].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));opts[bestIdx].click();pk=true;done.push(nm)}"
+"}else{"
+"for(var i=0;i<opts.length;i++){if((opts[i].innerText||'').trim().toLowerCase()===(txt||'').toLowerCase()){opts[i].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));opts[i].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));opts[i].click();pk=true;done.push(nm);break}}"
// Partial match fallback
+"if(!pk){for(var j=0;j<opts.length;j++){if((opts[j].innerText||'').trim().toLowerCase().indexOf((txt||'').toLowerCase())>-1){opts[j].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));opts[j].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));opts[j].click();pk=true;done.push(nm);break}}}"
+"}"
+"if(!pk){console.warn('Option not found for:', lblTxt, 'val:', txt||fz);box.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',keyCode:27,bubbles:true}));box.blur()}"
+"}else{console.warn('Listbox not found for:', lblTxt);box.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape',keyCode:27,bubbles:true}));box.blur()}"
+"if(cb)setTimeout(cb,1200)"
+"},1200)}"
// ===== INPUT_BY_LABEL =====
+"function INPUT_BY_LABEL(lblTxt,val,nm){"
+"if(!val)return;"
+"var all=document.querySelectorAll('label,span,p,div');var inp=null;"
+"for(var i=0;i<all.length;i++){"
+"var t=(all[i].innerText||'').trim().toLowerCase();"
+"var l=lblTxt.toLowerCase();"
+"if(t===l||t===l+':'||t===l+'*'||t===l+' *'){"
+"inp=all[i].querySelector('input,textarea');"
+"if(!inp){var p=all[i].parentElement;if(p)inp=p.querySelector('input,textarea');}"
+"if(!inp){var p2=all[i].parentElement?all[i].parentElement.parentElement:null;if(p2)inp=p2.querySelector('input,textarea');}"
+"if(!inp){var nx=all[i].nextElementSibling;if(nx){inp=(nx.tagName==='INPUT'||nx.tagName==='TEXTAREA')?nx:nx.querySelector('input,textarea');}}"
+"if(inp)break;"
+"}}"
+"if(inp){SV(inp,val);done.push(nm||lblTxt);} else {console.warn('Input not found for:', lblTxt)}"
+"}"
// ===== TIPO LENTE button click =====
+"if(D.tipo_lente){var btns=document.querySelectorAll('button');for(var b=0;b<btns.length;b++){if(btns[b].innerText&&btns[b].innerText.trim().toLowerCase()===D.tipo_lente.toLowerCase()){btns[b].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));btns[b].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));btns[b].click();done.push('Tipo: '+D.tipo_lente);break}}}"
+"setTimeout(function(){"
// Codigo interno
+"var ce=document.getElementById('optical-code-text');if(ce&&D.codigoInterno){SV(ce,D.codigoInterno);done.push('Codigo')}"
// Stock/Lab
+"var lt=D.labType||'STOCK';if(lt==='STOCK'){var ss=document.getElementById('switch-is-stock');if(ss&&!ss.checked){ss.click();done.push('Stock')}}else{var sl=document.getElementById('switch-is-laboratory');if(sl&&!sl.checked){sl.click();done.push('Lab')}}"
// Build autocomplete queue
+"var W=[];function AQ(id,v,lb,fz){if(v&&v!=='')W.push({id:id,val:String(v),label:lb,fuzzy:fz||null})}"
+"AQ('right-eye-far-spherical-autocomplete',D.od_esfera,'Esf OD');"
+"AQ('left-eye-far-spherical-autocomplete',D.oi_esfera,'Esf OI');"
+"AQ('right-eye-far-cylindrical-autocomplete',D.od_cilindro,'Cil OD');"
+"AQ('left-eye-far-cylindrical-autocomplete',D.oi_cilindro,'Cil OI');"
+"AQ('right-eye-far-axis-autocomplete',D.od_eje,'Eje OD');"
+"AQ('left-eye-far-axis-autocomplete',D.oi_eje,'Eje OI');"
+"if(D.tipo_lente==='Multifocal'||D.tipo_lente==='Ocupacional'){"
+"  AQ('right-eye-near-spherical-autocomplete',D.od_esfera_cerca,'Cerca Esf OD');"
+"  AQ('left-eye-near-spherical-autocomplete',D.oi_esfera_cerca,'Cerca Esf OI');"
+"  var tAddR=document.getElementById('right-eye-addition-text');if(tAddR&&D.od_adicion){SV(tAddR,D.od_adicion);done.push('Add OD')}"
+"  var tAddL=document.getElementById('left-eye-addition-text');if(tAddL&&D.oi_adicion){SV(tAddL,D.oi_adicion);done.push('Add OI')}"
+"}else{"
+"  var tAddR=document.getElementById('right-eye-addition-text');if(tAddR&&D.od_adicion){SV(tAddR,D.od_adicion);done.push('Add OD')}else{AQ('right-eye-addition-autocomplete',D.od_adicion,'Add OD')}"
+"  var tAddL=document.getElementById('left-eye-addition-text');if(tAddL&&D.oi_adicion){SV(tAddL,D.oi_adicion);done.push('Add OI')}else{AQ('left-eye-addition-autocomplete',D.oi_adicion,'Add OI')}"
+"}"
+"AQ('right-eye-interpupillary-distance-autocomplete',D.od_dp,'DP OD');"
+"AQ('left-eye-interpupillary-distance-autocomplete',D.oi_dp,'DP OI');"
+"AQ('right-eye-pupillary-height-autocomplete',D.od_altura,'Alt OD');"
+"AQ('left-eye-pupillary-height-autocomplete',D.oi_altura,'Alt OI');"
+"AQ('diameter-autocomplete',D.diametro,'Diam');"
// Color del cristal
+"AQ('color-autocomplete',D.color,'Color');"
// Material fuzzy
+"var ml=(D.material||'').toLowerCase(),tl=(D.tratamiento||'').toLowerCase(),fz=[];"
+"if(ml.indexOf('org')>-1)fz.push('org');"
+"if(ml.indexOf('poli')>-1)fz.push('poli');"
+"if(ml.indexOf('mineral')>-1)fz.push('mineral');"
+"if(tl.indexOf('blue')>-1||tl.indexOf('azul')>-1)fz.push('blue');"
+"else if(tl.indexOf('foto')>-1||tl.indexOf('transition')>-1)fz.push('foto');"
+"else if(tl.indexOf('antirreflejo')>-1||tl.indexOf('ar')>-1)fz.push('c/ar');"
+"else if(fz.length>0)fz.push('blanco');"
+"if(D.indice)fz.push(String(D.indice));"
+"if(fz.length>0||D.material)AQ('material-autocomplete',D.material||' ','Material',fz.length>0?fz:null);"
// Process autocomplete queue
+"var qi=0;"
+"function PN(){if(qi>=W.length){FU();return}"
+"var it=W[qi],el=document.getElementById(it.id);if(!el){qi++;PN();return}"
+"el.focus();el.click();SV(el,it.id==='material-autocomplete'?' ':it.val);"
+"setTimeout(function(){"
+"var lbs=document.querySelectorAll(\"[role='listbox']\");"
+"var lb=lbs[lbs.length-1],pk=false;"
+"if(lb){var opts=lb.querySelectorAll(\"[role='option']\");"
+"if(opts.length>0){"
// Use best-match for fuzzy in autocomplete queue too
+"if(it.fuzzy&&it.fuzzy.length>0){var bestIdx=-1,bestScore=0;for(var o=0;o<opts.length;o++){var ot=(opts[o].innerText||'').toLowerCase(),mc=0;for(var f=0;f<it.fuzzy.length;f++)if(ot.indexOf(it.fuzzy[f])>-1)mc++;if(mc>bestScore){bestScore=mc;bestIdx=o}}if(bestIdx>-1&&bestScore>0){opts[bestIdx].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));opts[bestIdx].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));opts[bestIdx].click();pk=true}}"
+"else{for(var o2=0;o2<opts.length;o2++){if((opts[o2].innerText||'').toLowerCase().indexOf(it.val.toLowerCase())>-1){opts[o2].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));opts[o2].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));opts[o2].click();pk=true;break}}if(!pk&&opts[0]){opts[0].dispatchEvent(new MouseEvent('mousedown',{bubbles:true,cancelable:true,view:window}));opts[0].dispatchEvent(new MouseEvent('mouseup',{bubbles:true,cancelable:true,view:window}));opts[0].click();pk=true}}"
+"}}"
+"if(!pk)el.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',keyCode:13,bubbles:true}));"
+"el.blur();done.push(it.label);qi++;setTimeout(PN,350)"
+"},500)}"
+"PN();"
// ===== FU: Final fields after autocomplete queue =====
+"function FU(){"
// Observaciones
+"var oe=document.getElementById('comment-textarea');if(oe&&D.observaciones){SV(oe,D.observaciones);done.push('Obs')}else{INPUT_BY_LABEL('Observación', D.observaciones, 'Obs')}"
// Armazon y Modelo
+"var fe=document.getElementById('frame-and-model-textarea');if(fe&&D.armazon){SV(fe,D.armazon);done.push('Armazon')}else{INPUT_BY_LABEL('Armazón y Modelo', D.armazon, 'Armazon')}"
// Garantia / Paciente
+"var allL=document.querySelectorAll('label,span,p,div');for(var l=0;l<allL.length;l++){if((allL[l].innerText||'').indexOf('Nombre y Apellido del Paciente')>-1){var gInp=null;var p=allL[l].parentElement;if(p)gInp=p.querySelector('input');if(!gInp){var p2=p?p.parentElement:null;if(p2)gInp=p2.querySelector('input');}if(!gInp){var nx=allL[l].nextElementSibling;if(nx)gInp=nx.tagName==='INPUT'?nx:nx.querySelector('input');}if(gInp){SV(gInp,D.paciente_fullname);done.push('Garantia');break;}}}"
// ===== CHAINED DROPDOWNS =====
+"var tAro=D.tipo_aro||'Calibrado Aro Entero';"
+"var tArm=D.tipo_armazon||'PLÁSTICO';"
+"SEL_BY_LABEL('Tipo de aro',tAro,'TipoAro',function(){"
+"SEL_BY_LABEL('Tipo armazón',tArm,'TipoArm',function(){"
+"var finish=function(){ alert('Campos completados ('+done.length+'): '+done.join(', ')+'\\\\n\\\\nRevisa todo antes de Guardar.'); };"
+"var stepIntensidad=function(){ if(D.intensidad_tenido) SEL_BY_LABEL('Intensidad teñido',D.intensidad_tenido,'IntTenido',finish); else finish(); };"
+"var stepColorTenido=function(){ if(D.color_tenido) SEL_BY_LABEL('Color teñido',D.color_tenido,'ColorTenido',stepIntensidad); else stepIntensidad(); };"
+"var stepTenido=function(){ if(D.tipo_tenido) SEL_BY_LABEL('Tipo teñido',D.tipo_tenido,'TipoTenido',stepColorTenido); else stepColorTenido(); };"
+"var stepOI=function(){ if(D.fuzzy_article&&D.fuzzy_article.length>0) SEL_BY_LABEL('Artículo ojo izquierdo',null,'Articulo OI',stepTenido,D.fuzzy_article); else stepTenido(); };"
+"var stepOD=function(){ if(D.fuzzy_article&&D.fuzzy_article.length>0) { setTimeout(function(){ SEL_BY_LABEL('Artículo ojo derecho',null,'Articulo OD',stepOI,D.fuzzy_article); }, 1500); } else stepTenido(); };"
// Medidas Pte, A, B, ED - try both SEL_BY_LABEL (dropdown) and INPUT_BY_LABEL (input)
+"var stepED=function(){ if(D.medidaED){ SEL_BY_LABEL('ED',D.medidaED,'ED',stepOD); } else stepOD(); };"
+"var stepB=function(){ if(D.medidaB){ SEL_BY_LABEL('B',D.medidaB,'B',stepED); } else stepED(); };"
+"var stepA=function(){ if(D.medidaA){ SEL_BY_LABEL('A',D.medidaA,'A',stepB); } else stepB(); };"
+"var stepPte=function(){ if(D.medidaPte){ SEL_BY_LABEL('Pte.',D.medidaPte,'Pte',stepA); } else stepA(); };"
+"stepPte();"
+"})})"
+"}"
+"},1200)"
+"}catch(e){alert('Error: '+e.message)}}())";

document.getElementById('robotLink').setAttribute('href', c);
</script>
</body>
</html>
