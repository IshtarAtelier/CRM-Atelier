[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh -c 'if [ -f server.js ]; then node node_modules/prisma/build/index.js migrate deploy && HOSTNAME=0.0.0.0 node server.js; else node index.js; fi'"

[cron]
schedule = "*/15 11-23 * * *"
command = "curl -s \"https://${RAILWAY_PUBLIC_DOMAIN:-crm-atelier-production-ae72.up.railway.app}/api/cron/smartlab-sync?secret=${CRON_SECRET}\""
